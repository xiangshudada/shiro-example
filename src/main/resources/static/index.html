<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .content-box {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 24px;
        }
        .link-box {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .link-box a {
            color: #667eea;
            text-decoration: none;
        }
        .link-box a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="content-box">
        <h1>Hello！！！</h1>
        <div class="link-box">
            <a href="/user/logout">退出登录</a>
        </div>
    </div>
</body>
</html>
